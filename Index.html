<!DOCTYPE html>
<html lang="en">

<head>
  <title>Travel Funnel Demo (GA4 Practice)</title>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-9T5ZNNEYEV"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-9T5ZNNEYEV');
</script>

  <style>
    body { font-family: Arial; margin:0; padding:0; }
    header { background:#0b3d91; color:#fff; padding:20px; text-align:center; }
    section { padding:40px; border-bottom:1px solid #ddd; }
    .btn { padding:12px 18px; margin:8px; background:#ff6a00; color:#fff; border:none; cursor:pointer; }
    .btn:hover { opacity:0.8; }
    input { padding:10px; width:250px; }
  </style>
</head>

<body>
<header>
  <h1>Travel Demo Funnel (GA4 + GTM)</h1>
</header>

<!-- HERO -->
<section id="hero">
  <h2>Explore Destinations</h2>

  <button class="btn tour-btn" data-destination="dubai">
    Dubai Tour
  </button>

  <button class="btn tour-btn" data-destination="abu-dhabi">
    Abu Dhabi Tour
  </button>

</section>

<!-- INFO -->
<section id="info">
  <h2>Why Choose Us</h2>

  <button class="btn info-btn" data-type="pricing">
    View Pricing
  </button>

  <button class="btn info-btn" data-type="offers">
    Special Offers
  </button>

</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact Us</h2>

  <button class="btn contact-btn" data-method="whatsapp">
    WhatsApp
  </button>

  <button class="btn contact-btn" data-method="email">
    Email
  </button>

</section>

<!-- LEAD FORM -->
<section id="lead">
  <h2>Get a Call Back</h2>

  <form id="leadForm">
    <input type="email" id="email" placeholder="Enter email" required>
    <button class="btn" type="submit">Submit</button>
  </form>

  <p id="msg" style="display:none; color:green;">
    Thanks! We will contact you soon.
  </p>
</section>

<!-- SOCIAL -->
<section id="social">
  <h2>Follow Us</h2>

  <a href="https://instagram.com" target="_blank" id="instaLink">
    Instagram
  </a>
</section>

<!-- ================= JS TRACKING ================= -->
<script>
document.addEventListener("DOMContentLoaded", function () {

  // ===== TOUR CLICK (Dubai / Abu Dhabi) =====
  document.querySelectorAll(".tour-btn").forEach(btn => {
    btn.addEventListener("click", function () {

      const destination = this.getAttribute("data-destination");

      if (typeof gtag === "function") {
        gtag("event", "tour_click", {
          button_text: this.innerText,
          destination: destination
        });
      }

      // smooth scroll instead of page navigation (FIXED)
      document.getElementById(destination).scrollIntoView({behavior:"smooth"});
    });
  });

  // ===== INFO CLICK =====
  document.querySelectorAll(".info-btn").forEach(btn => {
    btn.addEventListener("click", function () {

      if (typeof gtag === "function") {
        gtag("event", "info_click", {
          button_text: this.innerText,
          info_type: this.getAttribute("data-type")
        });
      }
    });
  });

  // ===== CONTACT CLICK =====
  document.querySelectorAll(".contact-btn").forEach(btn => {
    btn.addEventListener("click", function () {

      if (typeof gtag === "function") {
        gtag("event", "contact_click", {
          method: this.getAttribute("data-method"),
          button_text: this.innerText
        });
      }
    });
  });

  // ===== FORM SUBMIT =====
  document.getElementById("leadForm").addEventListener("submit", function(e){
    e.preventDefault();

    const email = document.getElementById("email").value;

    document.getElementById("msg").style.display = "block";

    if (typeof gtag === "function") {
      gtag("event", "generate_lead", {
        form_name: "callback_form",
        email_entered: email
      });
    }

    this.reset();
  });

  // ===== INSTAGRAM CLICK =====
  document.getElementById("instaLink").addEventListener("click", function () {

    if (typeof gtag === "function") {
      gtag("event", "social_click", {
        platform: "instagram"
      });
    }
  });

});
</script>

</body>
</html>
